<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Puja Pasal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#8B7355', bgmain: '#F0EDE5', textmain: '#1E1C25' } } }
    }
  </script>
</head>
<body class="min-h-screen bg-bgmain flex items-center justify-center font-sans">
  <div class="bg-white rounded-2xl shadow-xl p-10 w-full max-w-sm border-t-4 border-primary">

    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-primary rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-textmain">Puja Pasal</h1>
      <p class="text-sm text-gray-400 mt-1">Staff Admin Panel</p>
    </div>

    {% if error %}
      <div class="mb-5 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-600 text-sm flex items-center gap-2">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        {{ error }}
      </div>
    {% endif %}

    <form method="post" class="space-y-4">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.GET.next }}">

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1.5">Email</label>
        <input type="email" name="email" autofocus required
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 text-sm transition">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1.5">Password</label>
        <div class="relative">
          <input id="password" type="password" name="password" required
            class="w-full px-4 py-3 pr-11 rounded-xl border border-gray-200 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 text-sm transition [&::-ms-reveal]:hidden">
          <button type="button" onclick="togglePassword()"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary transition">
            <svg id="eye-off" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
            </svg>
            <svg id="eye-on" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit"
        class="w-full py-3 bg-primary hover:bg-opacity-90 active:scale-[0.98] text-white font-semibold rounded-xl transition mt-2">
        Sign In
      </button>
    </form>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const eyeOff = document.getElementById('eye-off');
      const eyeOn = document.getElementById('eye-on');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      eyeOff.classList.toggle('hidden', isHidden);
      eyeOn.classList.toggle('hidden', !isHidden);
    }
  </script>
</body>
</html>
