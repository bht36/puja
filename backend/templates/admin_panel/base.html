<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel{% endblock %} - Puja Pasal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#8B7355',
                        secondary: '#D4AF37',
                        bgmain: '#F0EDE5',
                        textmain: '#1E1C25',
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bgmain text-textmain font-sans">
    <!-- Sidebar -->
    <div class="flex h-screen">
        <aside class="w-64 bg-white shadow-lg">
            <div class="p-6 border-b border-gray-200">
                <h1 class="text-2xl font-bold text-primary">Puja Pasal</h1>
                <p class="text-sm text-gray-600">Admin Panel</p>
            </div>
            <nav class="p-4">
                <a href="{% url 'admin_panel:dashboard' %}" class="flex items-center px-4 py-3 mb-2 rounded-lg hover:bg-bgmain transition {% if request.resolver_match.url_name == 'dashboard' %}bg-bgmain text-primary{% endif %}">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    Dashboard
                </a>
                <a href="{% url 'admin_panel:products' %}" class="flex items-center px-4 py-3 mb-2 rounded-lg hover:bg-bgmain transition {% if request.resolver_match.url_name == 'products' %}bg-bgmain text-primary{% endif %}">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                    </svg>
                    Inventory
                </a>
                <a href="{% url 'admin_panel:categories' %}" class="flex items-center px-4 py-3 mb-2 rounded-lg hover:bg-bgmain transition {% if request.resolver_match.url_name == 'categories' %}bg-bgmain text-primary{% endif %}">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                    </svg>
                    Catalog
                </a>
                <a href="{% url 'admin_panel:scrap' %}" class="flex items-center px-4 py-3 mb-2 rounded-lg hover:bg-bgmain transition {% if request.resolver_match.url_name == 'scrap' %}bg-bgmain text-primary{% endif %}">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    Scrap Review
                </a>
                <a href="{% url 'admin_panel:users' %}" class="flex items-center px-4 py-3 mb-2 rounded-lg hover:bg-bgmain transition {% if request.resolver_match.url_name == 'users' %}bg-bgmain text-primary{% endif %}">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                    Users
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <!-- Header -->
            <header class="bg-white shadow-sm">
                <div class="flex items-center justify-between px-8 py-4">
                    <h2 class="text-2xl font-semibold text-textmain">{% block page_title %}Dashboard{% endblock %}</h2>
                    <div class="flex items-center space-x-4">
                        <span class="text-sm text-gray-600">{{ request.user.email }}</span>
                        <a href="/admin/logout/" class="px-4 py-2 text-sm bg-primary text-white rounded-lg hover:bg-opacity-90 transition">Logout</a>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="p-8">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
