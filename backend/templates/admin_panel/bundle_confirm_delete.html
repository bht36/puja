{% extends 'admin_panel/base.html' %}

{% block title %}Delete Bundle{% endblock %}
{% block page_title %}Delete Bundle{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-xl shadow-md p-8">
        <div class="text-center mb-6">
            <svg class="w-16 h-16 mx-auto text-red-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
            <h3 class="text-xl font-semibold text-gray-900 mb-2">Delete Bundle?</h3>
            <p class="text-gray-600">Are you sure you want to delete <strong>{{ bundle.name }}</strong>?</p>
            <p class="text-sm text-red-600 mt-2">This action cannot be undone.</p>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div class="flex space-x-4">
                <button type="submit" class="flex-1 px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition font-medium">
                    Yes, Delete
                </button>
                <a href="{% url 'admin_panel:categories' %}" class="flex-1 px-6 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition font-medium text-center">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
